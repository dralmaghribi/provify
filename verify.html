<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provify — Case Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy:    #09090B;
  --navy-2:  #0F0F12;
  --teal:    #7C6FFF;
  --white:   #FAFAFA;
  --gray:    #6B7280;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
body::before {
  content: '';
  position: fixed;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(124,111,255,0.06) 0%, transparent 65%);
  top: -150px; right: -150px;
  pointer-events: none;
}
.verify-box {
  width: 100%;
  max-width: 560px;
  background: linear-gradient(145deg, #0F0F12, #141418);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.verify-header {
  background: linear-gradient(135deg, rgba(124,111,255,0.12), rgba(124,111,255,0.04));
  border-bottom: 1px solid rgba(124,111,255,0.2);
  padding: 28px 32px;
  position: relative;
}
.verify-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(124,111,255,0.8), transparent);
}
.verify-logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.3rem;
  color: var(--white);
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}
.verify-logo span { color: var(--teal); }

.verify-status {
  display: flex;
  align-items: center;
  gap: 12px;
}
.status-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.status-icon.verified { background: rgba(124,111,255,0.15); border: 1px solid rgba(124,111,255,0.3); }
.status-icon.not-found { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); }
.status-icon.loading-icon { background: rgba(107,114,128,0.12); border: 1px solid rgba(107,114,128,0.2); }

.status-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.3rem;
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.status-title.verified { color: var(--teal); }
.status-title.not-found { color: #EF4444; }
.status-sub {
  font-size: 0.78rem;
  color: var(--gray);
  margin-top: 3px;
}

.verify-body { padding: 28px 32px; }

.case-id-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(124,111,255,0.08);
  border: 1px solid rgba(124,111,255,0.2);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 0.75rem;
  color: var(--teal);
  font-family: monospace;
  margin-bottom: 20px;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.field-row {
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.field-label {
  font-size: 0.72rem;
  color: var(--gray);
  min-width: 130px;
  padding-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.field-value {
  font-size: 0.875rem;
  color: var(--white);
  flex: 1;
  line-height: 1.5;
}

.ml-section {
  margin-top: 20px;
  padding: 16px;
  background: linear-gradient(135deg, rgba(124,111,255,0.07), rgba(124,111,255,0.02));
  border: 1px solid rgba(124,111,255,0.2);
  border-radius: 12px;
}
.ml-title {
  font-size: 0.65rem;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ml-field {
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  gap: 12px;
}
.ml-field:last-child { border-bottom: none; }
.ml-label { font-size: 0.7rem; color: var(--gray); min-width: 120px; padding-top: 1px; }
.ml-value { font-size: 0.82rem; color: var(--white); flex: 1; }

.timestamp-bar {
  margin-top: 20px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.timestamp-label { font-size: 0.7rem; color: var(--gray); }
.timestamp-value { font-size: 0.78rem; color: var(--white); font-family: monospace; }

.verify-footer {
  padding: 20px 32px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.footer-note {
  font-size: 0.72rem;
  color: var(--gray);
  line-height: 1.5;
  max-width: 320px;
}
.footer-link {
  font-size: 0.8rem;
  color: var(--teal);
  text-decoration: none;
  font-weight: 500;
  transition: opacity 0.2s;
}
.footer-link:hover { opacity: 0.8; }

.loading-state {
  text-align: center;
  padding: 40px;
  color: var(--gray);
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid rgba(255,255,255,0.06);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .verify-header, .verify-body, .verify-footer { padding: 20px; }
  .field-label, .ml-label { min-width: 100px; }
}
</style>
</head>
<body>

<div class="verify-box" id="verify-box">
  <div class="verify-header">
    <div class="verify-logo">Provify<span>.</span></div>
    <div class="verify-status" id="status-area">
      <div class="status-icon loading-icon">⏳</div>
      <div>
        <div class="status-title" style="color:var(--gray)">Verifying Record...</div>
        <div class="status-sub">Checking case database</div>
      </div>
    </div>
  </div>
  <div id="body-area">
    <div class="loading-state">
      <div class="spinner"></div>
      <div style="font-size:0.85rem;">Looking up case record...</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://latbebqtayfvgzgebxam.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IdTc1xIm34-sfTebJBt4Sg_XX_6U11x';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const caseId = params.get('id') || '';

const specLabel = { endo:'Endodontics', restorative:'Restorative Dentistry', surgery:'Oral Surgery', paeds:'Paediatric Dentistry' };
const roleLabel = { student:'Dental Student', intern:'Intern / House Officer', resident:'Resident', general:'General Dentist', specialist:'Specialist' };

async function verify() {
  if (!caseId) {
    showNotFound('No case ID provided.');
    return;
  }

  // Load case
  const { data: c, error } = await sb
    .from('cases')
    .select('*')
    .eq('id', caseId)
    .single();

  if (error || !c) {
    showNotFound('Case record not found in database.');
    return;
  }

  // Load clinician profile
  const { data: profile } = await sb
    .from('profiles')
    .select('first_name, last_name, role, username')
    .eq('id', c.user_id)
    .single();

  showVerified(c, profile);
}

function showNotFound(reason) {
  document.getElementById('status-area').innerHTML = `
    <div class="status-icon not-found">✗</div>
    <div>
      <div class="status-title not-found">Record Not Found</div>
      <div class="status-sub">${reason}</div>
    </div>`;
  document.getElementById('body-area').innerHTML = `
    <div class="verify-body">
      <p style="font-size:0.875rem;color:var(--gray);line-height:1.7;">This case ID could not be verified. The record may have been deleted, or the link may be incorrect.</p>
    </div>
    <div class="verify-footer">
      <div class="footer-note">Case verification is provided by Provify — provify.app</div>
      <a href="https://provify.app" class="footer-link">Visit Provify →</a>
    </div>`;
}

function showVerified(c, profile) {
  const clinicianName = profile ? `Dr. ${profile.first_name || ''} ${profile.last_name || ''}`.trim() : 'Unknown Clinician';
  const clinicianRole = profile ? (roleLabel[profile.role] || profile.role || 'Dentist') : 'Dentist';
  const spec = specLabel[c.specialty] || c.specialty || '—';
  const date = new Date(c.created_at).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const time = new Date(c.created_at).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const shortId = c.id?.substring(0,8).toUpperCase();

  // Parse medico-legal record
  let personalNote = c.note || '';
  let mlFields = [];
  if (c.note && c.note.includes('|| ML_RECORD:')) {
    const parts = c.note.split('|| ML_RECORD:');
    personalNote = parts[0].trim();
    const mlRaw = parts[1]?.trim() || '';
    mlFields = mlRaw.split(' | ').map(f => {
      const idx = f.indexOf(':');
      return idx !== -1 ? [f.substring(0,idx).trim(), f.substring(idx+1).trim()] : null;
    }).filter(Boolean);
  }

  // Update status
  document.getElementById('status-area').innerHTML = `
    <div class="status-icon verified">🛡</div>
    <div>
      <div class="status-title verified">Record Verified</div>
      <div class="status-sub">This case exists in the Provify database and has not been altered</div>
    </div>`;

  // Build fields
  const caseFields = [
    ['Clinician', clinicianName],
    ['Role', clinicianRole],
    ['Specialty', spec],
    ['Tooth', `Tooth ${c.tooth_number}`],
    ['Patient Age', c.age_range || '—'],
    ['Chief Complaint', c.complaint || '—'],
    ['Complexity Score', c.complexity_score ? `${c.complexity_score}/10` : '—'],
  ];

  if (c.specialty === 'endo') {
    if (c.pulp_diagnosis)       caseFields.push(['Pulp Diagnosis', c.pulp_diagnosis]);
    if (c.periapical_diagnosis) caseFields.push(['Periapical Dx', c.periapical_diagnosis]);
    if (c.case_type)            caseFields.push(['Case Type', c.case_type]);
    if (c.obturation)           caseFields.push(['Obturation', c.obturation]);
  } else if (c.specialty === 'restorative') {
    if (c.cavity_class) caseFields.push(['Cavity Class', c.cavity_class]);
    if (c.material)     caseFields.push(['Material', c.material]);
  } else if (c.specialty === 'surgery') {
    if (c.procedure)  caseFields.push(['Procedure', c.procedure]);
    if (c.anaesthesia)caseFields.push(['Anaesthesia', c.anaesthesia]);
  }
  if (c.post_op) caseFields.push(['Post-op', c.post_op]);

  const mlSectionHTML = mlFields.length > 0 ? `
    <div class="ml-section">
      <div class="ml-title">🛡 Medico-Legal Documentation</div>
      ${mlFields.map(([label, value]) => `
        <div class="ml-field">
          <div class="ml-label">${label}</div>
          <div class="ml-value">${value}</div>
        </div>`).join('')}
    </div>` : '';

  const narrativeHTML = c.narrative ? `
    <div style="margin-top:16px;padding:14px;background:rgba(124,111,255,0.05);border-left:3px solid rgba(124,111,255,0.4);border-radius:0 10px 10px 0;">
      <div style="font-size:0.62rem;color:var(--teal);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:8px;">Case Narrative</div>
      <div style="font-size:0.875rem;color:rgba(250,250,250,0.75);line-height:1.75;font-style:italic;">"${c.narrative}"</div>
    </div>` : '';

  document.getElementById('body-area').innerHTML = `
    <div class="verify-body">
      <div class="case-id-badge">
        🔑 CASE ID: ${shortId}···${c.id?.slice(-4).toUpperCase()}
      </div>

      ${caseFields.map(([label, value]) => `
        <div class="field-row">
          <div class="field-label">${label}</div>
          <div class="field-value">${value}</div>
        </div>`).join('')}

      ${narrativeHTML}
      ${mlSectionHTML}

      <div class="timestamp-bar">
        <div>
          <div class="timestamp-label">Record Created</div>
          <div class="timestamp-value">${date} at ${time}</div>
        </div>
        <div style="text-align:right;">
          <div class="timestamp-label">Database</div>
          <div class="timestamp-value">Provify · Supabase</div>
        </div>
      </div>
    </div>

    <div class="verify-footer">
      <div class="footer-note">
        This record was logged by ${clinicianName} through Provify and is stored in an immutable timestamped database. This page confirms the record exists and has not been modified.
      </div>
      <a href="https://provify.app" class="footer-link">provify.app →</a>
    </div>`;
}

verify();
</script>
</body>
</html>
