<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Portfolio · Provify</title>
<meta name="description" content="Verified clinical record — cases documented, complexity proven, growth measured.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #07090F;
    --navy-2: #0C0F18;
    --navy-3: #111520;
    --teal: #34D399;
    --purple: #7C6FFF;
    --amber: #F59E0B;
    --red: #EF4444;
    --blue: #60A5FA;
    --white: #F0F4FF;
    --gray: rgba(240,244,255,0.35);
  }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% -20%, rgba(124,111,255,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 80%, rgba(52,211,153,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 20px 100px;
  }

  /* Loading */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.06);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #error {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    gap: 12px;
  }

  #content { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Hero section */
  .hero {
    padding: 72px 0 48px;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--teal));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Instrument Serif', serif;
    font-size: 2rem;
    color: white;
    margin: 0 auto 20px;
    box-shadow: 0 0 40px rgba(124,111,255,0.3);
  }

  .dr-name {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 10px;
  }

  .dr-meta {
    font-size: 0.88rem;
    color: var(--gray);
    margin-bottom: 20px;
  }

  .verified-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(52,211,153,0.08);
    border: 1px solid rgba(52,211,153,0.2);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 0.68rem;
    color: var(--teal);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .verified-pill .dot {
    width: 5px; height: 5px;
    background: var(--teal);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Positioning line */
  .positioning {
    text-align: center;
    margin: 0 0 40px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .positioning-line {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    color: rgba(255,255,255,0.5);
    letter-spacing: -0.02em;
    font-style: italic;
  }

  .positioning-line strong {
    color: var(--white);
    font-style: normal;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease 0.15s both;
  }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    padding: 18px 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-number {
    font-family: 'Instrument Serif', serif;
    font-size: 2.2rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
  }

  /* Growth chart */
  .section {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 22px;
    padding: 24px;
    margin-bottom: 14px;
    animation: fadeUp 0.6s ease 0.2s both;
    position: relative;
    overflow: hidden;
  }

  .section-title {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 700;
    color: rgba(255,255,255,0.25);
    margin-bottom: 16px;
  }

  /* Specialty bars */
  .spec-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .spec-bar-row:last-child { margin-bottom: 0; }

  .spec-name {
    width: 60px;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.5);
    text-align: right;
    flex-shrink: 0;
  }

  .spec-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 100px;
    overflow: hidden;
  }

  .spec-bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 1s ease;
  }

  .spec-count {
    width: 24px;
    font-size: 0.68rem;
    font-weight: 600;
    text-align: left;
    flex-shrink: 0;
  }

  /* Best cases */
  .cases-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .case-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
    text-decoration: none;
  }

  .case-card:hover {
    border-color: rgba(124,111,255,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,111,255,0.1);
  }

  .case-photo {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
  }

  .case-photo-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    background: rgba(255,255,255,0.02);
  }

  .case-info {
    padding: 12px 14px;
  }

  .case-spec {
    font-size: 0.55rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .case-title-text {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .case-narrative-preview {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.3);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .case-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* Growth insight */
  .growth-insight {
    background: linear-gradient(135deg, rgba(52,211,153,0.08), rgba(52,211,153,0.02));
    border: 1px solid rgba(52,211,153,0.2);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 14px;
    animation: fadeUp 0.6s ease 0.25s both;
    position: relative;
    overflow: hidden;
  }

  .growth-insight::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
  }

  /* CTA footer */
  .footer-cta {
    text-align: center;
    margin-top: 56px;
    padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.06);
    animation: fadeUp 0.6s ease 0.35s both;
  }

  .footer-eyebrow {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }

  .footer-headline {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .footer-sub {
    font-size: 0.82rem;
    color: var(--gray);
    margin-bottom: 24px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--purple), #9B91FF);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    padding: 15px 36px;
    border-radius: 100px;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 8px 32px rgba(124,111,255,0.3);
    letter-spacing: -0.01em;
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(124,111,255,0.45);
  }

  .provify-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.3);
    margin-top: 20px;
    letter-spacing: -0.02em;
  }

  .provify-logo span { color: var(--teal); }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.58rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:0.78rem;color:var(--gray);">Loading portfolio...</div>
</div>

<div id="error">
  <div style="font-size:3rem;margin-bottom:8px;">🔍</div>
  <div style="font-family:'Instrument Serif',serif;font-size:1.4rem;margin-bottom:8px;">Portfolio not found</div>
  <div style="font-size:0.82rem;color:var(--gray);">This portfolio may have been removed or the link is invalid.</div>
  <a href="https://provify.app" style="margin-top:20px;color:var(--teal);font-size:0.82rem;">← Back to Provify</a>
</div>

<div class="wrap">
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://latbebqtayfvgzgebxam.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IdTc1xIm34-sfTebJBt4Sg_XX_6U11x';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const specColors = { endo:'#7C6FFF', restorative:'#F59E0B', surgery:'#EF4444', paeds:'#34D399', prostho:'#60A5FA' };
const specLabels = { endo:'Endo', restorative:'Resto', surgery:'Surgery', paeds:'Paeds', prostho:'Prostho' };
const specFull = { endo:'Endodontics', restorative:'Restorative', surgery:'Oral Surgery', paeds:'Paediatric', prostho:'Prosthodontics' };
const specIcons = { endo:'⚙', restorative:'◈', surgery:'✦', paeds:'◉', prostho:'◎' };

function getRankLabel(score) {
  if (score <= 3) return { label:'Routine', color:'#6B7280' };
  if (score <= 5) return { label:'Moderate', color:'#F59E0B' };
  if (score <= 7) return { label:'Complex', color:'#EF4444' };
  return { label:'Advanced', color:'#7C6FFF' };
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('id');
  const username = params.get('u');

  if (!userId && !username) { showError(); return; }

  try {
    // Get profile
    let profileQuery = sb.from('profiles').select('*');
    if (username) profileQuery = profileQuery.eq('username', username);
    else profileQuery = profileQuery.eq('id', userId);

    const { data: profile, error: pErr } = await profileQuery.single();
    if (pErr || !profile) { showError(); return; }

    // Get cases
    const { data: cases, error: cErr } = await sb
      .from('cases')
      .select('*')
      .eq('user_id', profile.id)
      .order('created_at', { ascending: true });

    if (cErr) { showError(); return; }

    render(profile, cases || []);
  } catch(e) {
    showError();
  }
}

function render(profile, cases) {
  document.getElementById('loading').style.display = 'none';
  const content = document.getElementById('content');
  content.style.display = 'block';

  const total = cases.length;
  const drName = `Dr. ${profile.first_name || ''} ${profile.last_name || ''}`.trim();
  const initials = ((profile.first_name?.[0] || '') + (profile.last_name?.[0] || '')).toUpperCase() || 'DR';
  const role = { student:'Dental Student', intern:'Intern', resident:'Resident', general:'General Dentist', specialist:'Specialist' }[profile.role] || profile.role || '';

  // Stats
  const avg = total > 0 ? (cases.reduce((s,c) => s + (c.complexity_score||0), 0) / total).toFixed(1) : 0;
  const highComp = cases.filter(c => (c.complexity_score||0) >= 7).length;
  const withPhotos = cases.filter(c => c.photo_urls && Object.keys(c.photo_urls||{}).length > 0).length;

  // Specialty breakdown
  const specCounts = {};
  cases.forEach(c => { if(c.specialty) specCounts[c.specialty] = (specCounts[c.specialty]||0) + 1; });
  const specList = Object.entries(specCounts).sort((a,b)=>b[1]-a[1]);
  const dominant = specList[0];

  // Growth story — first half avg vs second half avg
  const firstHalf = cases.slice(0, Math.floor(total/2));
  const secondHalf = cases.slice(Math.floor(total/2));
  const avgFirst = firstHalf.length > 0 ? (firstHalf.reduce((s,c)=>s+(c.complexity_score||0),0)/firstHalf.length).toFixed(1) : 0;
  const avgSecond = secondHalf.length > 0 ? (secondHalf.reduce((s,c)=>s+(c.complexity_score||0),0)/secondHalf.length).toFixed(1) : 0;
  const growthDelta = (parseFloat(avgSecond) - parseFloat(avgFirst)).toFixed(1);
  const isGrowing = parseFloat(growthDelta) > 0.3;

  // Months active
  const firstCase = cases[0] ? new Date(cases[0].created_at) : new Date();
  const lastCase = cases[cases.length-1] ? new Date(cases[cases.length-1].created_at) : new Date();
  const monthsActive = Math.max(1, Math.round((lastCase - firstCase) / (1000*60*60*24*30)));

  // Best cases — highest complexity with photos first
  const bestCases = [...cases]
    .sort((a,b) => {
      const aPhoto = a.photo_urls && Object.keys(a.photo_urls||{}).length > 0 ? 1 : 0;
      const bPhoto = b.photo_urls && Object.keys(b.photo_urls||{}).length > 0 ? 1 : 0;
      if (bPhoto !== aPhoto) return bPhoto - aPhoto;
      return (b.complexity_score||0) - (a.complexity_score||0);
    })
    .slice(0, 6);

  // Growth graph SVG
  const graphCases = cases.slice(-20);
  const scores = graphCases.map(c => c.complexity_score || 0);
  const W = 700, H = 100, PAD = 10;
  const xStep = scores.length > 1 ? (W - PAD*2) / (scores.length - 1) : 0;
  const points = scores.map((s,i) => ({
    x: PAD + i * xStep,
    y: H - PAD - (s / 10) * (H - PAD*2)
  }));
  let path = points.length > 0 ? `M ${points[0].x} ${points[0].y}` : '';
  for (let i = 1; i < points.length; i++) {
    const mx = (points[i-1].x + points[i].x) / 2;
    path += ` Q ${mx} ${points[i-1].y} ${points[i].x} ${points[i].y}`;
  }
  const fillPath = path + (points.length > 0 ? ` L ${points[points.length-1].x} ${H} L ${points[0].x} ${H} Z` : '');
  const graphColor = isGrowing ? '#34D399' : '#7C6FFF';

  document.title = `${drName} · Clinical Portfolio`;

  content.innerHTML = `
    <!-- Hero -->
    <div class="hero">
      <div class="avatar">${initials}</div>
      <div class="dr-name">${drName}</div>
      <div class="dr-meta">${role}${profile.primary_specialty ? ` · ${specFull[profile.primary_specialty] || profile.primary_specialty}` : ''}</div>
      <div class="verified-pill">
        <div class="dot"></div>
        Verified on Provify
      </div>
    </div>

    <!-- Positioning line -->
    ${total >= 5 ? `
    <div class="positioning">
      <div class="positioning-line">
        ${isGrowing
          ? `Complexity grew <strong>+${growthDelta} points</strong> over ${monthsActive} month${monthsActive>1?'s':''}. Not luck. <strong>Documented growth.</strong>`
          : `<strong>${total} verified cases.</strong> Every one timestamped. Every decision on record.`
        }
      </div>
    </div>
    ` : ''}

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card" style="border-color:rgba(124,111,255,0.15);">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#7C6FFF,transparent);"></div>
        <div class="stat-number" style="color:#9B91FF;">${total}</div>
        <div class="stat-label" style="color:rgba(155,145,255,0.5);">Cases</div>
      </div>
      <div class="stat-card" style="border-color:rgba(52,211,153,0.15);">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#34D399,transparent);"></div>
        <div class="stat-number" style="color:#34D399;">${avg}</div>
        <div class="stat-label" style="color:rgba(52,211,153,0.5);">Avg Complexity</div>
      </div>
      <div class="stat-card" style="border-color:rgba(239,68,68,0.15);">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#EF4444,transparent);"></div>
        <div class="stat-number" style="color:#EF4444;">${highComp}</div>
        <div class="stat-label" style="color:rgba(239,68,68,0.5);">Complex (7+)</div>
      </div>
      <div class="stat-card" style="border-color:rgba(245,158,11,0.15);">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#F59E0B,transparent);"></div>
        <div class="stat-number" style="color:#F59E0B;">${monthsActive}</div>
        <div class="stat-label" style="color:rgba(245,158,11,0.5);">Months Active</div>
      </div>
    </div>

    ${total >= 6 ? `
    <!-- Growth curve -->
    <div class="section" style="animation-delay:0.2s;">
      <div class="section-title">Complexity Growth — Last ${graphCases.length} Cases</div>
      <div style="position:relative;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.015);padding:8px 0;">
        <svg width="100%" height="100" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;">
          <defs>
            <linearGradient id="gFill" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="${graphColor}" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="${graphColor}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${[2,4,6,8].map(v => {
            const y = H - PAD - (v/10)*(H-PAD*2);
            return `<line x1="${PAD}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <text x="${PAD-2}" y="${y+3}" text-anchor="end" font-size="8" fill="rgba(255,255,255,0.15)" font-family="DM Sans">${v}</text>`;
          }).join('')}
          <path d="${fillPath}" fill="url(#gFill)"/>
          <path d="${path}" fill="none" stroke="${graphColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${points.map((p,i) => i === points.length-1
            ? `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${graphColor}" stroke="rgba(0,0,0,0.5)" stroke-width="1.5"/>
               <circle cx="${p.x}" cy="${p.y}" r="8" fill="none" stroke="${graphColor}" stroke-width="1" opacity="0.3"/>`
            : `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="${graphColor}" opacity="0.5"/>`
          ).join('')}
        </svg>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;">
        <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-family:'Instrument Serif',serif;font-size:1.2rem;color:rgba(255,255,255,0.4);line-height:1;">${avgFirst}</div>
          <div style="font-size:0.52rem;color:rgba(255,255,255,0.2);margin-top:2px;text-transform:uppercase;letter-spacing:0.1em;">Early avg</div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-family:'Instrument Serif',serif;font-size:1.2rem;color:${graphColor};line-height:1;">${avgSecond}</div>
          <div style="font-size:0.52rem;color:rgba(255,255,255,0.2);margin-top:2px;text-transform:uppercase;letter-spacing:0.1em;">Recent avg</div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-family:'Instrument Serif',serif;font-size:1.2rem;color:${isGrowing?'#34D399':'rgba(255,255,255,0.4)'};line-height:1;">${isGrowing?'+':''}${growthDelta}</div>
          <div style="font-size:0.52rem;color:rgba(255,255,255,0.2);margin-top:2px;text-transform:uppercase;letter-spacing:0.1em;">Growth</div>
        </div>
      </div>
    </div>
    ` : ''}

    ${specList.length > 0 ? `
    <!-- Specialty breakdown -->
    <div class="section" style="animation-delay:0.25s;">
      <div class="section-title">Clinical Specialties</div>
      ${specList.map(([spec, count]) => {
        const pct = Math.round(count/total*100);
        const color = specColors[spec] || '#7C6FFF';
        return `
        <div class="spec-bar-row">
          <div class="spec-name">${specLabels[spec] || spec}</div>
          <div class="spec-bar-track">
            <div class="spec-bar-fill" style="width:${pct}%;background:${color};box-shadow:0 0 8px ${color}40;"></div>
          </div>
          <div class="spec-count" style="color:${color};">${count}</div>
          <div style="font-size:0.6rem;color:rgba(255,255,255,0.2);width:28px;">${pct}%</div>
        </div>`;
      }).join('')}
    </div>
    ` : ''}

    ${bestCases.length > 0 ? `
    <!-- Best cases -->
    <div style="margin-bottom:14px;animation:fadeUp 0.6s ease 0.3s both;">
      <div class="section-title" style="margin-bottom:12px;">Selected Cases</div>
      <div class="cases-grid">
        ${bestCases.map(c => {
          const color = specColors[c.specialty] || '#7C6FFF';
          const rank = getRankLabel(c.complexity_score||0);
          const photos = c.photo_urls ? Object.values(c.photo_urls).filter(Boolean) : [];
          const firstPhoto = photos[0] || null;
          const date = new Date(c.created_at).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
          return `
          <a href="https://provify.app/verify.html?id=${c.id}" target="_blank" class="case-card" style="border-color:rgba(255,255,255,0.07);">
            <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${color},${color}40,transparent);"></div>
            ${firstPhoto
              ? `<img src="${firstPhoto}" class="case-photo" alt="Case photo" loading="lazy"/>`
              : `<div class="case-photo-placeholder" style="background:${color}08;">${specIcons[c.specialty]||'🦷'}</div>`
            }
            <div class="case-info">
              <div class="case-spec" style="color:${color};">${specFull[c.specialty]||c.specialty}</div>
              <div class="case-title-text">Tooth ${c.tooth_number||'—'}</div>
              ${c.narrative ? `<div class="case-narrative-preview">${c.narrative}</div>` : ''}
              <div class="case-meta">
                <span class="badge" style="background:${rank.color}15;color:${rank.color};">${rank.label}</span>
                <span style="font-size:0.58rem;color:rgba(255,255,255,0.2);">${date}</span>
              </div>
            </div>
          </a>`;
        }).join('')}
      </div>
    </div>
    ` : ''}

    <!-- Footer CTA -->
    <div class="footer-cta">
      <div class="footer-eyebrow">Built on Provify</div>
      <div class="footer-headline">Experience isn't years.<br>It's cases.</div>
      <div class="footer-sub">Every case ${drName} logged is verified, timestamped, and permanently on record. This is what standing out looks like.</div>
      <a href="https://provify.app" class="cta-btn">Build Your Portfolio →</a>
      <div class="provify-logo" style="margin-top:24px;">Provify<span>.</span></div>
    </div>
  `;

  // Fix case card positioning
  content.querySelectorAll('.case-card').forEach(el => el.style.position = 'relative');
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
}

load();
</script>
</body>
</html>
