<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Portfolio — Provify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #09090B;
  --navy-2: #0F0F12;
  --navy-3: #141418;
  --teal: #7C6FFF;
  --teal-dim: rgba(124,111,255,0.08);
  --teal-mid: rgba(124,111,255,0.22);
  --white: #F4F7F9;
  --white-dim: #F4F7F970;
  --white-faint: #F4F7F912;
  --gray: #8892A4;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--navy);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* NOISE */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 100;
  opacity: 0.3;
}

/* LOADING */
.loading {
  position: fixed;
  inset: 0;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 200;
}

.loading-logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.8rem;
  color: var(--white);
}
.loading-logo span { color: var(--teal); }

.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--white-faint);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* NOT FOUND */
.not-found {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  text-align: center;
  padding: 40px;
}

.not-found h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 3rem;
  color: var(--white);
}

.not-found p { color: var(--gray); font-size: 1rem; }

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 16px 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, var(--navy) 0%, transparent 100%);
}

.nav-logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.3rem;
  color: var(--white);
  text-decoration: none;
  letter-spacing: -0.02em;
}
.nav-logo span { color: var(--teal); }

.nav-cta {
  background: var(--teal);
  color: var(--navy);
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 0.8rem;
  padding: 8px 20px;
  border-radius: 100px;
  text-decoration: none;
  transition: all 0.2s;
}
.nav-cta:hover { background: #9B91FF; }

/* PORTFOLIO CONTENT */
.portfolio {
  display: none;
  max-width: 860px;
  margin: 0 auto;
  padding: 100px 24px 80px;
}

/* HEADER */
.portfolio-header {
  padding-bottom: 40px;
  border-bottom: 1px solid var(--white-faint);
  margin-bottom: 60px;
  animation: fadeUp 0.7s ease both;
}

.portfolio-name {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(2.5rem, 6vw, 4rem);
  color: var(--white);
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 8px;
}

.portfolio-role {
  font-size: 1rem;
  color: var(--teal);
  font-weight: 400;
  margin-bottom: 16px;
  letter-spacing: 0.02em;
}

.portfolio-bio {
  font-size: 1rem;
  color: var(--gray);
  line-height: 1.7;
  max-width: 560px;
  margin-bottom: 24px;
}

.portfolio-meta {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  align-items: center;
}

.portfolio-meta-item {
  font-size: 0.8rem;
  color: var(--gray);
  display: flex;
  align-items: center;
  gap: 6px;
}

.portfolio-meta-item strong {
  color: var(--white);
  font-weight: 500;
}

.powered-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--teal-dim);
  border: 1px solid var(--teal-mid);
  color: var(--teal);
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 100px;
  text-decoration: none;
  margin-left: auto;
}

/* CASE CARDS */
.cases-section {
  animation: fadeUp 0.7s 0.2s ease both;
}

.section-label {
  font-size: 0.7rem;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 32px;
}

.case-card {
  background: var(--navy-2);
  border: 1px solid var(--white-faint);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 40px;
  transition: border-color 0.3s;
  animation: fadeUp 0.6s ease both;
}

.case-card:hover { border-color: var(--teal-mid); }

/* CASE HEADER */
.case-header {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--white-faint);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.case-header-left { flex: 1; }

.case-specialty-tag {
  display: inline-block;
  background: var(--teal-dim);
  border: 1px solid var(--teal-mid);
  color: var(--teal);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 100px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

.case-tooth-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.6rem;
  color: var(--white);
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.case-date {
  font-size: 0.8rem;
  color: var(--gray);
  margin-top: 4px;
}

.complexity-badge {
  background: var(--navy-3);
  border: 1px solid var(--white-faint);
  border-radius: 12px;
  padding: 12px 16px;
  text-align: center;
  flex-shrink: 0;
}

.complexity-number {
  font-family: 'Instrument Serif', serif;
  font-size: 1.8rem;
  color: var(--teal);
  letter-spacing: -0.02em;
  line-height: 1;
}

.complexity-label {
  font-size: 0.6rem;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
}

/* NARRATIVE */
.case-narrative {
  padding: 24px 32px;
  border-bottom: 1px solid var(--white-faint);
}

.narrative-text {
  font-size: 1rem;
  color: var(--white-dim);
  line-height: 1.8;
  font-style: italic;
  position: relative;
  padding-left: 20px;
}

.narrative-text::before {
  content: '"';
  position: absolute;
  left: 0;
  top: -4px;
  font-family: 'Instrument Serif', serif;
  font-size: 2.5rem;
  color: var(--teal);
  line-height: 1;
  opacity: 0.7;
}

/* PHOTOS */
.case-photos {
  padding: 24px 32px;
  border-bottom: 1px solid var(--white-faint);
}

.photos-label {
  font-size: 0.65rem;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 14px;
}

.photos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
}

.photo-item {
  border-radius: 10px;
  overflow: hidden;
  background: var(--navy-3);
  aspect-ratio: 1;
  position: relative;
}

.photo-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  cursor: pointer;
  transition: transform 0.3s;
}

.photo-item img:hover { transform: scale(1.03); }

.photo-item-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(8,15,30,0.9));
  color: var(--white-dim);
  font-size: 0.6rem;
  padding: 8px 6px 4px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.photo-empty {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white-faint);
  font-size: 1.5rem;
}

/* CASE DETAILS */
.case-details {
  padding: 20px 32px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.detail-item { }

.detail-label {
  font-size: 0.65rem;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 2px;
}

.detail-value {
  font-size: 0.85rem;
  color: var(--white-dim);
  font-weight: 400;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(8, 15, 30, 0.97);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.lightbox.active { display: flex; }

.lightbox img {
  max-width: 100%;
  max-height: 90vh;
  border-radius: 12px;
  object-fit: contain;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 24px;
  color: var(--gray);
  font-size: 2rem;
  cursor: pointer;
  background: none;
  border: none;
  transition: color 0.2s;
}
.lightbox-close:hover { color: var(--white); }

.lightbox-caption {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--gray);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* EMPTY PORTFOLIO */
.empty-portfolio {
  text-align: center;
  padding: 80px 20px;
  color: var(--gray);
}

.empty-portfolio h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.8rem;
  color: var(--white-dim);
  margin-bottom: 12px;
}

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MOBILE */
@media (max-width: 600px) {
  .portfolio { padding: 80px 16px 60px; }
  .case-header { padding: 20px; }
  .case-narrative { padding: 20px; }
  .case-photos { padding: 20px; }
  .case-details { padding: 16px 20px; }
  .portfolio-meta { flex-direction: column; align-items: flex-start; gap: 12px; }
  .powered-badge { margin-left: 0; }
}
</style>
</head>
<body>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="loading-logo">Provify<span>.</span></div>
  <div class="spinner"></div>
</div>

<!-- NOT FOUND -->
<div class="not-found" id="not-found">
  <h1>Portfolio not found</h1>
  <p>This portfolio doesn't exist or hasn't been made public yet.</p>
  <a href="https://provify.app" style="color:var(--teal); text-decoration:none; margin-top:8px">← Back to Provify</a>
</div>

<!-- NAV -->
<nav>
  <a href="https://provify.app" class="nav-logo">Provify<span>.</span></a>
  <a href="https://provify.app/app.html" class="nav-cta">Start Your Portfolio →</a>
</nav>

<!-- PORTFOLIO -->
<div class="portfolio" id="portfolio">

  <!-- HEADER -->
  <div class="portfolio-header">
    <div class="portfolio-name" id="p-name">Dr. Abdullah Al Maghribi</div>
    <div class="portfolio-role" id="p-role">Dental Intern</div>
    <div class="portfolio-bio" id="p-bio"></div>
    <div class="portfolio-meta">
      <div class="portfolio-meta-item">
        <span>📋</span>
        <span><strong id="p-total">0</strong> cases</span>
      </div>
      <div class="portfolio-meta-item">
        <span>⭐</span>
        <span>Avg complexity <strong id="p-avg">—</strong>/10</span>
      </div>
      <a href="https://provify.app/app.html" class="powered-badge" target="_blank">
        Powered by Provify
      </a>
    </div>
  </div>

  <!-- CASES -->
  <div class="cases-section">
    <div class="section-label">Clinical Cases</div>
    <div id="cases-container"></div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://latbebqtayfvgzgebxam.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IdTc1xIm34-sfTebJBt4Sg_XX_6U11x';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// Get username or user ID from URL
const params = new URLSearchParams(window.location.search);
const username = params.get('u') || '';
const userId = params.get('id') || '';

const PHOTO_LABELS = {
  'xr-preop': 'Pre-op X-Ray',
  'xr-wl': 'Working Length',
  'xr-mc': 'Master Cone',
  'xr-obturation': 'Final Obturation',
  'xr-postop': 'Post-op X-Ray',
  'xr-gen-preop': 'Pre-op X-Ray',
  'xr-gen-postop': 'Post-op X-Ray',
  'cp-preop': 'Clinical Pre-op',
  'cp-postop': 'Clinical Post-op',
  'cp-intraoral': 'Intraoral',
};

async function loadPortfolio() {
  if (!username && !userId) {
    showNotFound();
    return;
  }

  let profile = null;
  let resolvedUserId = userId;

  // Try by username
  if (username) {
    const { data, error } = await sb
      .from('profiles')
      .select('*')
      .eq('username', username)
      .single();
    if (!error && data) { profile = data; resolvedUserId = data.id; }
  }

  // Try by user ID
  if (!profile && userId) {
    const { data, error } = await sb
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single();
    if (!error && data) { profile = data; resolvedUserId = data.id; }
  }

  // If still no profile but we have userId, create minimal profile
  if (!profile && userId) {
    profile = { id: userId, first_name: 'Dr.', last_name: '', role: 'dentist' };
    resolvedUserId = userId;
  }

  if (!profile) {
    showNotFound();
    return;
  }

  // Load cases
  const { data: cases, error: casesError } = await sb
    .from('cases')
    .select('*')
    .eq('user_id', resolvedUserId)
    .order('created_at', { ascending: false });

  if (casesError) { showNotFound(); return; }

  // Render profile
  const fullName = `Dr. ${profile.first_name || ''} ${profile.last_name || ''}`.trim();
  document.title = `${fullName} — Clinical Portfolio`;
  document.getElementById('p-name').textContent = fullName;

  const roleMap = {
    student: 'Dental Student',
    intern: 'Dental Intern',
    resident: 'Resident',
    general: 'General Dentist',
    specialist: 'Specialist',
  };
  document.getElementById('p-role').textContent = roleMap[profile.role] || profile.role || 'Dentist';

  if (profile.bio) {
    document.getElementById('p-bio').textContent = profile.bio;
  } else {
    document.getElementById('p-bio').style.display = 'none';
  }

  const casesWithNarrative = cases.filter(c => c.narrative);
  document.getElementById('p-total').textContent = casesWithNarrative.length || cases.length;

  if (cases.length > 0) {
    const avg = (cases.reduce((s, c) => s + (c.complexity_score || 0), 0) / cases.length).toFixed(1);
    document.getElementById('p-avg').textContent = avg;
  }

  // Render cases — show cases with narrative first, then others
  const sorted = [...casesWithNarrative, ...cases.filter(c => !c.narrative)];

  const container = document.getElementById('cases-container');

  if (sorted.length === 0) {
    container.innerHTML = `
      <div class="empty-portfolio">
        <h2>No cases yet</h2>
        <p>Cases logged on Provify will appear here.</p>
      </div>
    `;
  } else {
    container.innerHTML = sorted.map((c, i) => renderCaseCard(c, i, resolvedUserId)).join('');
  }

  // Show portfolio
  document.getElementById('loading').style.display = 'none';
  document.getElementById('portfolio').style.display = 'block';
}

function renderCaseCard(c, index, userId) {
  const specLabel = { endo: 'Endodontics', restorative: 'Restorative', surgery: 'Surgery' }[c.specialty] || c.specialty;
  const date = new Date(c.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const delay = index * 0.1;

  // Build detail items
  const details = [];
  if (c.complaint) details.push(['Chief Complaint', c.complaint]);
  if (c.age_range) details.push(['Patient Age', c.age_range]);

  if (c.specialty === 'endo') {
    if (c.pulp_diagnosis) details.push(['Pulp Diagnosis', c.pulp_diagnosis]);
    if (c.periapical_diagnosis) details.push(['Periapical Dx', c.periapical_diagnosis]);
    if (c.case_type) details.push(['Case Type', c.case_type]);
    if (c.canals) details.push(['Canals', c.canals]);
    if (c.curvature) details.push(['Curvature', c.curvature]);
    if (c.obturation) details.push(['Obturation', c.obturation]);
    if (c.calcification === 'Yes') details.push(['Calcification', 'Present']);
  } else if (c.specialty === 'restorative') {
    if (c.cavity_class) details.push(['Cavity Class', c.cavity_class]);
    if (c.surfaces) details.push(['Surfaces', c.surfaces]);
    if (c.material) details.push(['Material', c.material]);
  } else if (c.specialty === 'surgery') {
    if (c.procedure) details.push(['Procedure', c.procedure]);
    if (c.impaction && c.impaction !== 'N/A') details.push(['Impaction', c.impaction]);
  }

  if (c.post_op && c.post_op !== 'None') details.push(['Post-op', c.post_op]);

  // Photo slots for this case
  const photoTypes = c.specialty === 'endo'
    ? ['xr-preop', 'xr-wl', 'xr-mc', 'xr-obturation', 'xr-postop', 'cp-preop', 'cp-postop', 'cp-intraoral']
    : ['xr-gen-preop', 'xr-gen-postop', 'cp-preop', 'cp-postop', 'cp-intraoral'];

  const photosHTML = photoTypes.map(type => {
    const baseUrl = `${SUPABASE_URL}/storage/v1/object/public/case-images/${userId}/${c.id}/${type}`;
    const label = PHOTO_LABELS[type] || type;
    return `
      <div class="photo-item" id="photo-${c.id}-${type}">
        <img
          src="${baseUrl}.jpg"
          alt="${label}"
          onclick="openLightbox(this.src, '${label}')"
          onerror="tryNextExt(this, '${baseUrl}', ['jpeg','png','webp','heic','HEIC','JPG','PNG'], '${label}', '${c.id}-${type}')"
          loading="lazy"
        >
        <div class="photo-item-label">${label}</div>
      </div>
    `;
  }).join('');

  const detailsHTML = details.map(([label, value]) => `
    <div class="detail-item">
      <div class="detail-label">${label}</div>
      <div class="detail-value">${value}</div>
    </div>
  `).join('');

  return `
    <div class="case-card" style="animation-delay:${delay}s">
      <div class="case-header">
        <div class="case-header-left">
          <div class="case-specialty-tag">${specLabel}</div>
          <div class="case-tooth-title">Tooth ${c.tooth_number}</div>
          <div class="case-date">${date}</div>
        </div>
        <div class="complexity-badge">
          <div class="complexity-number">${c.complexity_score || '—'}</div>
          <div class="complexity-label">Complexity</div>
        </div>
      </div>

      ${c.narrative ? `
      <div class="case-narrative">
        <div class="narrative-text">${escapeHTML(c.narrative)}</div>
      </div>
      ` : ''}

      <div class="case-photos" id="photos-section-${c.id}">
        <div class="photos-label">Radiographs & Clinical Photos</div>
        <div class="photos-grid">${photosHTML}</div>
      </div>

      ${details.length > 0 ? `
      <div class="case-details">${detailsHTML}</div>
      ` : ''}
    </div>
  `;
}

function tryNextExt(img, baseUrl, exts, label, slotId) {
  if (exts.length === 0) {
    // All extensions failed — hide the slot entirely
    const slot = document.getElementById(`photo-${slotId}`);
    if (slot) slot.style.display = 'none';
    return;
  }
  const next = exts.shift();
  const newSrc = `${baseUrl}.${next}`;
  img.onerror = () => tryNextExt(img, baseUrl, exts, label, slotId);
  img.src = newSrc;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function openLightbox(src, caption) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-caption').textContent = caption;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function showNotFound() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('not-found').style.display = 'flex';
}

// Close lightbox on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

loadPortfolio();
</script>
</body>
</html>
